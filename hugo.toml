  url = "https://www.youtube.com/@TecWithDarwin"
  weight = 1

[[menu.main]]
  name = "Blog"
  url = "/"
  weight = 3

[[menu.main]]
  name = "Acerca de"
  url = "/about/"
  weight = 4

[[menu.main]]
  name = "RSS"
